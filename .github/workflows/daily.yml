name: Scrape

on:
  workflow_dispatch: {} # Manuell "Run workflow"-knapp
  schedule:
    - cron: '0 3 * * *' # Dagligen 03:00 UTC (05:00 CEST / 04:00 CET)

permissions:
  contents: write # krävs för git push med GITHUB_TOKEN

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # underlättar rebase innan push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install

      # Kör varje script i eget steg, fortsätt även om ett misslyckas
      - name: Run fetch_kpi.py
        run: python ./scripts/fetch_kpi.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run amazon_scape_bought_playwright_us_de.py
        run: python ./scripts/amazon_scape_bought_playwright_us_de.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_combined_prices.py
        run: python ./scripts/track_combined_prices.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_fractal_rankings_playwright.py
        run: python ./scripts/track_fractal_rankings_playwright.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_nelly_aov.py
        run: python ./scripts/track_nelly_aov.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_rugvista_bestsellers.py
        run: python ./scripts/track_rugvista_bestsellers.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_rugvista_daily_sales.py
        run: python ./scripts/track_rugvista_daily_sales.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run youtube_diy_trends.py
        run: python ./scripts/youtube_diy_trends.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_revolutionrace_reviews.py
        run: python ./scripts/track_revolutionrace_reviews.py
        timeout-minutes: 15
        continue-on-error: true

      - name: Run fetch_ted_procurements.py
        run: python ./scripts/fetch_ted_procurements.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_rvrc_sales.py
        run: python ./scripts/track_rvrc_sales.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Run track_nelly_inventory.py
        run: python ./scripts/track_nelly_inventory.py
        timeout-minutes: 30
        continue-on-error: true

      - name: Commit & push generated data (if any)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ github.ref_name }}"

          # Lägg bara till data-katalogen och scripts/html_dumps i repo-roten
          git add -A data scripts/html_dumps || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(data): update scraped XLSX [skip ci]"

          git pull --rebase origin "$BRANCH" || true

          git push origin "$BRANCH"

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-outputs
          path: |
            data/**
            Scripts/data/**

      - name: Install jq
        if: always()
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate job summary table
        if: always()
        run: |
          set -euo pipefail
          SUMMARY="$GITHUB_STEP_SUMMARY"
          echo "## 📊 Daily Scraper Summary" >> "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "| Script | Description | Output file | Status | Metrics |" >> "$SUMMARY"
          echo "|:--|:--|:--|:--|:--|" >> "$SUMMARY"

          declare -A DESCR
          DESCR[fetch_kpi.py]="Scrapes Adtraction's platform page for total conversion and brand-count KPIs"
          DESCR[amazon_scape_bought_playwright_us_de.py]="Scrapes Amazon US & DE for 'bought in past month' counts and BSR rankings for Fractal Scape & Refine cases"
          DESCR[track_combined_prices.py]="Scrapes Fractal Design case prices across Inet, Webhallen, MediaMarkt, Newegg & AWD-IT; records daily avg/median per retailer"
          DESCR[track_fractal_rankings_playwright.py]="Tracks Fractal Design product ranking positions on Newegg category pages"
          DESCR[track_nelly_aov.py]="Scrapes Nelly.com selling prices (handling discounted & regular items) and estimates average order value (AOV)"
          DESCR[track_rugvista_bestsellers.py]="Scrapes Rugvista bestseller list prices; records daily median & average rug price"
          DESCR[track_rugvista_daily_sales.py]="Diffs Rugvista top-seller API snapshots to estimate daily unit sales and revenue"
          DESCR[youtube_diy_trends.py]="Counts new 'Gaming PC Build' YouTube uploads in the past 7 days as a PC-demand signal (requires YOUTUBE_API_KEY)"
          DESCR[fetch_ted_procurements.py]="Fetches EU procurement notices for tracked companies from the public TED API; writes one Excel sheet per company"
          DESCR[track_rvrc_sales.py]="Tracks RevolutionRace sale_last_week and sale_last_days counters per product-colour via Voyado Elevate API; computes weekly revenue at sell and list price in EUR"
          DESCR[track_revolutionrace_reviews.py]="Diffs RevolutionRace review counts via GraphQL; estimates sales-activity proxy as price × new reviews"
          DESCR[track_nelly_inventory.py]="Tracks Nelly.com + NlyMan inventory at product-colour level across 20 markets via Voyado Elevate API; estimates daily unit sales and revenue via stock delta"

          declare -A OUTFILE
          OUTFILE[fetch_kpi.py]="data/kpi-history.xlsx"
          OUTFILE[amazon_scape_bought_playwright_us_de.py]="data/scape_bought_by_country.xlsx"
          OUTFILE[track_combined_prices.py]="data/combined_prices.xlsx"
          OUTFILE[track_fractal_rankings_playwright.py]="data/fractal_rankings.xlsx"
          OUTFILE[track_nelly_aov.py]="data/nelly_aov.xlsx"
          OUTFILE[track_rugvista_bestsellers.py]="data/rugvista_bestsellers.xlsx"
          OUTFILE[track_rugvista_daily_sales.py]="data/rugvista_daily_sales.xlsx"
          OUTFILE[youtube_diy_trends.py]="data/youtube_diy_sentiment.xlsx"
          OUTFILE[fetch_ted_procurements.py]="data/ted_procurements.xlsx"
          OUTFILE[track_rvrc_sales.py]="data/rvrc_sales.xlsx"
          OUTFILE[track_revolutionrace_reviews.py]="data/revolutionrace_reviews.xlsx"
          OUTFILE[track_nelly_inventory.py]="data/nelly_inventory.xlsx"

          METRICS_DIR="scripts/metrics"
          mkdir -p "$METRICS_DIR"
          today=$(date -u +%Y-%m-%d)

          for script in "fetch_kpi.py" "amazon_scape_bought_playwright_us_de.py" "track_combined_prices.py" \
                        "track_fractal_rankings_playwright.py" "track_nelly_aov.py" "track_rugvista_bestsellers.py" \
                        "track_rugvista_daily_sales.py" "youtube_diy_trends.py" "fetch_ted_procurements.py" \
                        "track_rvrc_sales.py" "track_revolutionrace_reviews.py" "track_nelly_inventory.py"; do
            desc="${DESCR[$script]:-—}"
            outfile="${OUTFILE[$script]:-}"
            jsonfile="$METRICS_DIR/${script}.json"

            # Determine status by checking whether the output file was written today
            if [ -n "$outfile" ] && [ -f "$outfile" ]; then
              file_date=$(date -u -r "$outfile" +%Y-%m-%d 2>/dev/null || echo "")
              if [ "$file_date" = "$today" ]; then
                status="✅ Updated"
              else
                status="⚠️ Stale (last: $file_date)"
              fi
            else
              status="❌ No output"
            fi

            # Read metrics JSON if present
            if [ -f "$jsonfile" ]; then
              metrics_str=$(jq -r 'to_entries | map("\(.key)=\(.value)") | join(", ")' "$jsonfile" 2>/dev/null || echo "invalid json")
            else
              metrics_str="—"
            fi

            printf "| \`%s\` | %s | \`%s\` | %s | %s |\n" "$script" "$desc" "$outfile" "$status" "$metrics_str" >> "$SUMMARY"
          done

          echo "" >> "$SUMMARY"
          echo "🕒 Run finished at $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$SUMMARY"

