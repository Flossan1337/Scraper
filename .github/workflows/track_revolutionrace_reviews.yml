name: Track RevolutionRace Reviews

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC every day (09:00 CEST / 08:00 CET)
  workflow_dispatch:        # allow manual runs from GitHub UI

# Allow the workflow to commit files back to the repo
permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (with latest state files)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python scripts/track_revolutionrace_reviews.py

      - name: Commit updated state and Excel back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/revolutionrace_state.json data/revolutionrace_reviews.xlsx
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update revolutionrace review data [$(date -u +%Y-%m-%d)]"
          git push
